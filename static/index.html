<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repo Chatbot</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3348;
    --accent:   #4f8ef7;
    --accent2:  #2563eb;
    --text:     #e2e8f0;
    --muted:    #8892a4;
    --user-bg:  #2563eb;
    --bot-bg:   #1e2235;
    --err-bg:   #3b1212;
    --err-text: #f87171;
    --pill-bg:  #1e2a3a;
    --pill-text:#60a5fa;
    --radius:   12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    padding: 14px 20px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .status-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pill {
    background: var(--pill-bg);
    color: var(--pill-text);
    border: 1px solid #1d3a6e;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .pill.warn {
    background: #2a1a0a;
    color: #fb923c;
    border-color: #7c3502;
  }

  /* ── Repo selector ───────────────────────────────────────── */
  .repo-bar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .repo-btn {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .repo-btn:hover { border-color: var(--accent); color: var(--text); }
  .repo-btn.active {
    background: var(--accent2);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── Chat area ───────────────────────────────────────────── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }
  .bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
  .bubble-wrap.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 0.9rem;
    word-break: break-word;
  }
  .bubble.user {
    background: var(--user-bg);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .bubble.error {
    background: var(--err-bg);
    color: var(--err-text);
    border: 1px solid #7f1d1d;
  }

  /* markdown inside bot bubble */
  .bubble.bot p  { margin: 0.5em 0; }
  .bubble.bot p:first-child { margin-top: 0; }
  .bubble.bot p:last-child  { margin-bottom: 0; }
  .bubble.bot pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    font-size: 0.82rem;
    margin: 8px 0;
  }
  .bubble.bot code { font-family: "SF Mono", Menlo, monospace; font-size: 0.85em; }
  .bubble.bot pre code { background: none; padding: 0; }
  .bubble.bot code:not(pre code) {
    background: #1e2235;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .bubble.bot ul, .bubble.bot ol { padding-left: 1.4em; }
  .bubble.bot h1,.bubble.bot h2,.bubble.bot h3 { margin: 0.6em 0 0.3em; }

  /* thinking animation */
  .bubble.thinking { color: var(--muted); font-style: italic; }
  .bubble.thinking::after {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: 6px;
    vertical-align: middle;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  /* ── Sources panel ───────────────────────────────────────── */
  .sources-toggle {
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 0;
    user-select: none;
    margin-top: 4px;
  }
  .sources-toggle:hover { color: var(--text); }
  .sources-list {
    display: none;
    flex-direction: column;
    gap: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 4px;
    font-size: 0.74rem;
  }
  .sources-list.open { display: flex; }
  .source-item { color: var(--muted); line-height: 1.5; }
  .source-item.neighbor { color: #4b5675; }
  .rewrite-note {
    font-size: 0.74rem;
    color: #6b7a99;
    margin-top: 3px;
    font-style: italic;
  }

  /* ── Input bar ───────────────────────────────────────────── */
  .input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #msg {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  #msg:focus { border-color: var(--accent); }
  #msg::placeholder { color: var(--muted); }
  #msg:disabled { opacity: 0.5; }

  .btn {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    align-self: flex-end;
  }
  .btn:hover:not(:disabled) { background: var(--accent); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn.secondary:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>Repo Chatbot</h1>
    <div class="status-pills" id="status-pills">
      <span class="pill warn">Loading…</span>
    </div>
  </div>
</header>

<div class="repo-bar" id="repo-bar">
  <button class="repo-btn active" data-ns="both">Both</button>
</div>

<div id="chat"></div>

<div class="input-bar">
  <textarea id="msg" rows="1" placeholder="Ask about the codebase…"></textarea>
  <button class="btn" id="send-btn" onclick="sendMessage()">Send</button>
  <button class="btn secondary" id="clear-btn" onclick="clearChat()">Clear</button>
</div>

<script>
  let selectedNs = "both";
  let repoNames  = [];

  // ── Auto-resize textarea ─────────────────────────────────────────────────
  const msgEl = document.getElementById("msg");
  msgEl.addEventListener("input", () => {
    msgEl.style.height = "auto";
    msgEl.style.height = Math.min(msgEl.scrollHeight, 160) + "px";
  });
  msgEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Load status ──────────────────────────────────────────────────────────
  async function loadStatus() {
    try {
      const r = await fetch("/api/status");
      const d = await r.json();
      const pillsEl = document.getElementById("status-pills");
      const barEl   = document.getElementById("repo-bar");

      if (!d.loaded) {
        pillsEl.innerHTML = '<span class="pill warn">No repos loaded — run ingest.py first</span>';
        return;
      }

      repoNames = d.repos.map(r => r.repo_name);
      pillsEl.innerHTML = d.repos
        .map(r => `<span class="pill">${r.repo_name} · ${r.chunk_count} chunks</span>`)
        .join("");

      // Build selector buttons
      barEl.innerHTML = "";
      d.repos.forEach(repo => {
        const btn = document.createElement("button");
        btn.className = "repo-btn";
        btn.textContent = repo.repo_name;
        btn.dataset.ns  = repo.repo_name;
        btn.onclick = () => selectNs(repo.repo_name, btn);
        barEl.appendChild(btn);
      });
      const bothBtn = document.createElement("button");
      bothBtn.className  = "repo-btn active";
      bothBtn.textContent = "Both";
      bothBtn.dataset.ns  = "both";
      bothBtn.onclick = () => selectNs("both", bothBtn);
      barEl.appendChild(bothBtn);
    } catch(e) {
      document.getElementById("status-pills").innerHTML =
        '<span class="pill warn">Could not reach server</span>';
    }
  }

  function selectNs(ns, btn) {
    selectedNs = ns;
    document.querySelectorAll(".repo-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  // ── Chat helpers ─────────────────────────────────────────────────────────
  const chatEl = document.getElementById("chat");

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function appendBubble(role, html, isMarkdown=false) {
    const wrap = document.createElement("div");
    wrap.className = `bubble-wrap ${role}`;
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    if (isMarkdown) {
      bubble.innerHTML = marked.parse(html);
    } else {
      bubble.textContent = html;
    }
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    scrollToBottom();
    return { wrap, bubble };
  }

  function appendThinking() {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot";
    const bubble = document.createElement("div");
    bubble.className = "bubble bot thinking";
    bubble.textContent = "Thinking";
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function appendSources(wrap, chunks, rewritten, original) {
    if (!chunks || chunks.length === 0) return;

    const toggle = document.createElement("div");
    toggle.className = "sources-toggle";
    toggle.textContent = `📎 ${chunks.length} source${chunks.length > 1 ? "s" : ""}`;

    const list = document.createElement("div");
    list.className = "sources-list";
    chunks.forEach(c => {
      const item = document.createElement("div");
      item.className = c.retrieval_type === "graph_neighbor"
        ? "source-item neighbor"
        : "source-item";
      const prefix = c.retrieval_type === "graph_neighbor" ? "↗ " : "";
      item.textContent = `${prefix}${c.repo_name} · ${c.file_path} · ${c.kind}: ${c.name} · lines ${c.line_start}-${c.line_end}`;
      list.appendChild(item);
    });

    toggle.onclick = () => list.classList.toggle("open");
    wrap.appendChild(toggle);
    wrap.appendChild(list);

    if (rewritten && rewritten !== original) {
      const note = document.createElement("div");
      note.className = "rewrite-note";
      note.textContent = `🔍 Searched as: ${rewritten}`;
      wrap.appendChild(note);
    }
  }

  function setInputDisabled(disabled) {
    msgEl.disabled = disabled;
    document.getElementById("send-btn").disabled  = disabled;
    document.getElementById("clear-btn").disabled = disabled;
  }

  // ── Send ─────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = msgEl.value.trim();
    if (!text) return;

    msgEl.value = "";
    msgEl.style.height = "auto";
    setInputDisabled(true);

    appendBubble("user", text);
    const thinkEl = appendThinking();

    try {
      const resp = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, namespace: selectedNs }),
      });
      const data = await resp.json();

      thinkEl.remove();

      if (data.error) {
        appendBubble("bot error", `Error: ${data.error}`);
      } else {
        const { wrap } = appendBubble("bot", data.answer, true);
        appendSources(wrap, data.sources, data.rewritten_query, text);
      }
    } catch(e) {
      thinkEl.remove();
      const { bubble } = appendBubble("bot", `Network error: ${e.message}`);
      bubble.classList.add("error");
    } finally {
      setInputDisabled(false);
      msgEl.focus();
    }
  }

  // ── Clear ────────────────────────────────────────────────────────────────
  async function clearChat() {
    try {
      await fetch("/api/clear", { method: "POST" });
    } catch(e) {}
    chatEl.innerHTML = "";
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  loadStatus();
</script>
</body>
</html>
